# Qwen3-VL-8B-Thinking Fine-Tuning Configuration
# GPU: H200 SXM (141GB VRAM) — vast.ai
# Method: QLoRA 4-bit via Unsloth

model:
  name: "unsloth/Qwen3-VL-8B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true
  dtype: "bfloat16"

lora:
  r: 512                    # H200 MAX — ~1.4B trainable param, 141GB VRAM'a siğer
  lora_alpha: 1024          # Scaling factor (2x rank)
  lora_dropout: 0.05        # Küçük dropout overfitting'i önler
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  use_gradient_checkpointing: "unsloth"

training:
  output_dir: "./output/satis-reklam-ai"
  num_train_epochs: 3                      # 5M x 3 epoch = 15M toplam
  per_device_train_batch_size: 8           # OOM fix: 64'ten 8'e dusuruldu
  gradient_accumulation_steps: 64          # Effective batch = 8×64 = 512
  learning_rate: 1.0e-4                    # Büyük batch → daha küçük LR
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  logging_steps: 50
  save_strategy: "epoch"
  save_total_limit: 3
  seed: 42
  max_grad_norm: 1.0
  optim: "adamw_8bit"

data:
  train_file: "./data/processed/train.jsonl"
  eval_file: "./data/processed/eval.jsonl"
  eval_split: 0.1                        # 10% evaluation split

system_prompt: |
  Sen bir satış psikolojisi ve dijital reklam stratejisi uzmanısın.
  Türkiye ve global pazarları iyi bilirsin. Görevin:

  1. Reklam kampanya verilerini analiz edip performans değerlendirmesi yapmak
  2. Satış psikolojisi ve ikna tekniklerine dayalı stratejik öneriler sunmak
  3. Meta Ads ve Google Ads optimizasyon tavsiyeleri vermek
  4. Reklam görsellerini ve metinlerini analiz edip iyileştirme önerileri sunmak
  5. Somut, uygulanabilir aksiyon planları oluşturmak

  Her zaman somut rakamlar, sektörel benchmarklar ve psikolojik çerçeveler kullan.
  Jenerik tavsiyelerden kaçın. Adım adım düşün ve muhakeme yap.
